<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Focus Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body {
  background: linear-gradient(135deg, #0f0c29, #1a1a3f, #2a0845);
  color: white;
  overflow-x:hidden;
}

.hero {
  height: 100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:80px 10%;
}

.hero-text {max-width:550px;}
.hero h1 {
  font-size:48px;
  font-weight:800;
  background: linear-gradient(90deg, #4facfe, #a4508b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p {margin:20px 0;font-size:18px;color:#ccc;}

.buttons {margin-top:25px;}

.btn {
  padding:12px 25px;
  margin-right:15px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
  display:inline-block;
}

.btn-primary {
  background: linear-gradient(90deg, #4facfe, #a4508b);
  color:white;
  box-shadow:0 0 15px #4facfe;
}
.btn-primary:hover {
  transform:scale(1.05);
  box-shadow:0 0 25px #a4508b;
}

.btn-outline {
  border:1px solid #4facfe;
  color:#4facfe;
}
.btn-outline:hover {
  background:#4facfe;
  color:black;
  box-shadow:0 0 20px #4facfe;
}

.video-frame {
  width:450px;
  height:300px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  position:relative;
}

.bounding-box {
  position:absolute;
  width:80px;
  height:140px;
  border:2px solid #4facfe;
  box-shadow:0 0 15px #4facfe;
  top:100px;
  left:100px;
  animation:move 3s infinite alternate ease-in-out;
}

@keyframes move {
  from { left:50px; }
  to { left:250px; }
}
</style>
</head>

<body>
  
    <py-script>
    
    </py-script>  

<section class="hero">
  <div class="hero-text">
    <h1>Tap. Track. Focus. Powered by AI.</h1>
    <p>Experience real-time AI subject tracking and smart auto-focus that keeps every movement sharp and centered.</p>

    <div class="buttons">
      <a href="live-demo.html" class="btn btn-primary">Try Live Demo</a>
      <a href="upload.html" class="btn btn-outline">Upload Video</a>
    </div>
  </div>

  <div class="video-frame">
    <div class="bounding-box"></div>
  </div>
</section>

</body>
</html>
